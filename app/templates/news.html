<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC News - AI Core</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #007aff;
            --bg: #0a0e17;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }


         body {
            /* 1. Сначала задаем сплошной темный цвет (на случай, если картинки нет) */
            background-color: #0a0e17; 
            
            /* 2. Накладываем градиент и картинку */
            background-image: linear-gradient(rgba(10, 14, 23, 0.85), rgba(10, 14, 23, 0.85)), 
                            url("/static/images/backgroundnews.jpg");
            
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-top: 100px;
            
            /* Убираем лишние флексы, если они ломают сетку */
            display: block; 
        }

        /* --- ТВОЙ NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: 0.3s;
            padding: 8px 12px;
            border-radius: 10px;
        }

        .nav-links a:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-links a.active {
            color: var(--accent);
            background: rgba(0, 122, 255, 0.1);
        }

        /* --- КОНТЕНТ НОВОСТЕЙ --- */
        .container {
            max-width: 1200px;
            margin: 0 auto; /* Центрируем контент */
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 36px;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .news-card {
            background: rgba(255, 255, 255, 0.07); /* Чуть больше непрозрачности */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            transition: 0.3s ease;
            /* Убедись, что текст внутри карточек ВСЕГДА белый */
            color: white !important; 
        }
        

        .news-card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .badge {
            background: rgba(0, 122, 255, 0.15);
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: inline-block;
        }

        .news-card h3 {
            margin: 0;
            font-size: 1.2rem;
            line-height: 1.4;
            font-weight: 600;
        }

        .external-icon {
            align-self: flex-end;
            margin-top: 15px;
            font-size: 14px;
            color: var(--accent);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="/about">О авторе и проекте</a>
            <a href="/analytics">Аналитика</a>
            <a href="/profile">Профиль</a>
            <a href="/">Главная</a>
            <a href="/support">Поддержка</a>
            <a href="/admin">Админка</a>
            <a href="/news" class="active">BBC News</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>BBC <span style="color: var(--accent);">World</span> News</h1>
            <p style="color: rgba(255,255,255,0.4);">Последние обновления из раздела Iran War</p>
        </div>

        <div class="news-grid">
            {% for item in news %}
            <a href="{{ item.url }}" target="_blank" class="news-card">
                <div>
                    <span class="badge">Live Update</span>
                    <h3>{{ item.title }}</h3>
                </div>
                <div class="external-icon">
                    Перейти <i class="fas fa-arrow-right"></i>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>

</body>
</html>
