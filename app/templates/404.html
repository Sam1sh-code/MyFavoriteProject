<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="/static/images/favicon.png?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Страница не найдена</title>
    <style>
        :root {
            --bg-color: #050a14;
            --accent-color: #007aff;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1a2a6c 0%, #050a14 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            overflow: hidden;
            text-align: center;
        }

        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: clamp(100px, 20vw, 250px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -10px;
        }

        /* Стиль для цифр 4 */
        .digit {
            /* Градиентный текст */
            background: linear-gradient(to bottom, #ffffff, #666666);
            background-clip: text; /* Стандарт */
            -webkit-background-clip: text; /* Для Chrome/Safari */
            
            /* Делаем сам текст прозрачным, чтобы был виден фон-градиент */
            color: transparent; 
            -webkit-text-fill-color: transparent;

            /* ПРАВИЛЬНАЯ ТЕНЬ */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .video-zero {
            width: 0.8em;
            height: 0.8em;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 122, 255, 0.5);
            background: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video::-webkit-media-controls {
            display: none !important;
        }
        video::-webkit-media-controls-enclosure {
            display: none !important;
        }

        /* Убираем лишние границы, оставляем один четкий контур */
        .video-zero video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            pointer-events: none; /* Чтобы клик пролетал сквозь видео в контейнер */
        }

        /* Красивый значок громкости */
        #volumeIcon {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
            opacity: 0.7;
            pointer-events: none; /* Чтобы иконка не мешала клику по видео */
            transition: opacity 0.3s;
        }

        .video-zero:hover #volumeIcon {
            opacity: 1;
            transform: translateX(-50%) scale(1.1);
        }
        /* Если хочешь добавить тонкий ободок, делай его через псевдоэлемент, 
        так он не будет «двоиться» с контейнером */
        .video-zero::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        h2 {
            font-size: 24px;
            font-weight: 400;
            margin-top: 20px;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .back-link {
            margin-top: 40px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--accent-color);
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--accent-color);
            color: white;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <span class="digit">4</span>
        <div class="video-zero" onclick="toggleMute()">
            <video id="memeVideo" autoplay loop muted playsinline style="width: 100%; height: 100%; object-fit: cover;">
                <source src="/static/video/4.mp4" type="video/mp4">
            </video>
            <div id="volumeIcon">🔇</div>
        </div>
        <span class="digit">4</span>
    </div>

    <h2>Страница не найдена</h2>
    <p style="margin-top: 10px; opacity: 0.5;"></p>

    <a href="/" class="back-link">Вернуться на главную</a>
    <script>
        function toggleMute() {
            const video = document.getElementById('memeVideo');
            const icon = document.getElementById('volumeIcon');
            
            if (video.muted) {
                video.muted = false;
                icon.innerHTML = "🔊"; // Включено
            } else {
                video.muted = true;
                icon.innerHTML = "🔇"; // Выключено
            }
        }
    </script>   
</body>
</html>
