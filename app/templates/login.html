<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/png" href="/static/images/favicon.png?v=2">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Enter</title>
    <style>
        :root {
            --bg-color: #050a14;
            --glass-bg: rgba(0, 0, 0, 0.65); /* Чуть темнее для лучшего контраста */
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-color: #007aff; 
            --text-color: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            /* Подключаем твою картинку аналогично странице регистрации */
            background-image: linear-gradient(rgba(5, 10, 20, 0.4), rgba(5, 10, 20, 0.4)), 
                              url("/static/images/backgroundlogin.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: flex-end; /* Панель прижата к ПРАВОМУ краю */
            color: var(--text-color);
            overflow: hidden;
        }

        /* Основная панель входа */
        .login-panel {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-left: 1px solid var(--glass-border); /* Граница слева */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 60px;
            box-shadow: -20px 0 50px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideInRight {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.8px;
        }

        p.subtitle {
            font-size: 15px;
            opacity: 0.5;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            opacity: 0.6;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 16px;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.2);
        }

        .btn-login:hover {
            background: #0084ff;
            transform: translateY(-2px);
        }

        .footer-link {
            margin-top: 30px;
            font-size: 14px;
            text-align: center;
            opacity: 0.7;
        }

        .footer-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-panel {
                padding: 0 30px;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <main class="login-panel">
        <h2>С возвращением</h2>
        <p class="subtitle">Авторизуйтесь, чтобы продолжить работу.</p>
        
        <form action="/login" method="post">
            <div class="input-group">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username" placeholder="Ваш логин" required>
            </div>

            <div class="input-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Ваш пароль" required>
            </div>

            <button type="submit" class="btn-login">Войти</button>
        </form>

        <p class="footer-link">
            Нет аккаунта? <a href="/register">Создать сейчас</a>
        </p>
    </main>

</body>

</html>
